version: '3.8'

services:
  tinix-story:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tinix-story
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - NOVEL_TOOL_HOST=0.0.0.0
      - NOVEL_TOOL_PORT=7860
      - APP_LANGUAGE=VI
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./output:/app/output
